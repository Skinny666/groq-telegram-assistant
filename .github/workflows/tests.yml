name: Tests

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install locked dependencies
        run: |
          python -m pip install \
            --only-binary=:all: \
            --require-hashes \
            --no-cache-dir \
            -r requirements.lock

      - name: Validate
        run: make check PYTHON=python
